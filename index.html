<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Waiter Daily Checklist</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f6f8;
    margin: 0;
    padding: 20px;
}

.container {
    max-width: 800px;
    margin: auto;
    background: white;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.08);
}

h1 {
    text-align: center;
}

.tab-buttons {
    text-align: center;
    margin-bottom: 20px;
}

.tab-buttons button {
    padding: 10px 15px;
    margin: 5px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    background: #2e7d32;
    color: white;
}

.tab-buttons button.active {
    background: #1b5e20;
}

.checklist-item {
    margin: 8px 0;
}

.progress-container {
    margin-top: 20px;
    background: #eee;
    border-radius: 20px;
    overflow: hidden;
}

.progress-bar {
    height: 18px;
    width: 0%;
    background: #2e7d32;
    text-align: center;
    color: white;
    font-size: 12px;
}
</style>
</head>

<body>

<div class="container">

<h1>Waiter Daily Checklist</h1>

<div class="tab-buttons">
    <button onclick="showOpening()" id="openBtn" class="active">Opening</button>
    <button onclick="showClosing()" id="closeBtn">Closing</button>
</div>

<div id="checklist"></div>

<div class="progress-container">
    <div class="progress-bar" id="progressBar">0%</div>
</div>

</div>

<script>

const openingTasks = [
"Turn on ESB computer & Start Day on POS",
"Turn on EDC machine & other cashier equipment",
"Check paper roll and test print EDC & POS",
"Turn on AC & all outlet lighting",
"Prepare indoor & outdoor dining area",
"Repolish cutlery",
"Set up plates & cutlery",
"Check all condiments & supplies",
"Assign station & double-check everything"
];

const closingTasks = [
"Clock out & record overtime (if any)",
"Close POS (ensure all bills are settled & balanced)",
"Shut down POS system (after all reports are cleared)",
"Charge EDC, iPad & outlet phone",
"Clear speaker, outlet phone & bench area (weekend only)",
"Clear all tables & remove plates and cutlery",
"Sweep indoor dining area (after guests have left)",
"Double check everything & dispose all trash bags",
"Spray insect repellent in all indoor areas (after guests leave)",
"Wipe & reorganize all table and chair positions",
"Return front chairs & umbrella stands inside",
"Soak cleaning cloths",
"Rinse cleaning cloths & hang to dry",
"Polish cutlery & saucers",
"Refill all condiments & utilities",
"Prepare pizza boxes for the next day",
"Check product & floor supplies stock",
"Submit PR request if stock is low",
"Turn off AC, lights & speakers",
"Lock all outlet doors & store keys in designated place"
];

let currentMode = "opening";

function renderChecklist() {
    const checklistDiv = document.getElementById("checklist");
    const tasks = currentMode === "opening" ? openingTasks : closingTasks;
    checklistDiv.innerHTML = "";

    tasks.forEach((task, index) => {
        const key = currentMode + "_" + index;
        const checked = localStorage.getItem(key) === "true";
        checklistDiv.innerHTML += `
            <div class="checklist-item">
                <input type="checkbox"
                ${checked ? "checked" : ""}
                onchange="saveTask('${key}', this.checked)">
                ${task}
            </div>
        `;
    });

    updateProgress();
}

function saveTask(key, value) {
    localStorage.setItem(key, value);
    updateProgress();
}

function updateProgress() {
    const tasks = currentMode === "opening" ? openingTasks : closingTasks;
    let completed = 0;

    tasks.forEach((_, index) => {
        const key = currentMode + "_" + index;
        if (localStorage.getItem(key) === "true") {
            completed++;
        }
    });

    const percent = Math.round((completed / tasks.length) * 100);
    const progressBar = document.getElementById("progressBar");
    progressBar.style.width = percent + "%";
    progressBar.textContent = percent + "%";
}

function showOpening() {
    currentMode = "opening";
    document.getElementById("openBtn").classList.add("active");
    document.getElementById("closeBtn").classList.remove("active");
    renderChecklist();
}

function showClosing() {
    currentMode = "closing";
    document.getElementById("closeBtn").classList.add("active");
    document.getElementById("openBtn").classList.remove("active");
    renderChecklist();
}

renderChecklist();

</script>

</body>
</html>

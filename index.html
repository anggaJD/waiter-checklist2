<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Opening Checklist - Waiter</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f6f8;
    margin: 0;
    padding: 20px;
}

.container {
    max-width: 750px;
    margin: auto;
    background: #ffffff;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.08);
}

h1 {
    text-align: center;
    margin-bottom: 5px;
}

.date {
    text-align: center;
    margin-bottom: 20px;
    font-size: 14px;
    color: #555;
}

.section-title {
    margin-top: 25px;
    font-weight: bold;
    font-size: 16px;
}

.checklist-item {
    margin: 8px 0;
}

.progress-container {
    margin-top: 20px;
    background: #eee;
    border-radius: 20px;
    overflow: hidden;
}

.progress-bar {
    height: 18px;
    width: 0%;
    background: #2e7d32;
    text-align: center;
    color: white;
    font-size: 12px;
}

.signature-box {
    margin-top: 25px;
}

input[type="text"] {
    padding: 6px;
    width: 100%;
    margin-top: 5px;
}

button {
    margin-top: 20px;
    padding: 10px 15px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

.reset {
    background: #c62828;
    color: white;
}

.footer {
    margin-top: 15px;
    text-align: center;
    font-size: 12px;
    color: gray;
}
</style>
</head>

<body>

<div class="container">

<h1>Opening Checklist – Waiter</h1>
<div class="date" id="currentDate"></div>

<div id="checklist"></div>

<div class="progress-container">
    <div class="progress-bar" id="progressBar">0%</div>
</div>

<div class="signature-box">
    <label>Waiter Name:</label>
    <input type="text" id="waiterName" placeholder="Type your name here">
    
    <label style="margin-top:10px; display:block;">Supervisor Name:</label>
    <input type="text" id="supervisorName" placeholder="Supervisor approval">
</div>

<button class="reset" onclick="resetChecklist()">Reset Checklist</button>

<div class="footer">
Offline Mode | Auto Save Enabled
</div>

</div>

<script>

const tasks = [
"Turn on ESB computer & Start Day on POS",
"Turn on EDC machine & other cashier equipment",
"Check paper roll and test print EDC & POS",
"Turn on AC & all outlet lighting",
"Sun-dry and water all plants",
"Prepare indoor & outdoor dining area",
"Fold cleaning cloths & sun-dry again if not fully dry",
"Sweep & mop all areas",
"Wipe tables & arrange table and chair layout",
"Repolish cutlery (make sure no fingerprints)",
"Set up plates & cutlery",
"Adjust main dining calendar/date display",
"Check all condiments, tissues & stock supplies",
"Update bar & kitchen stock",
"Return plants to original position (10:30)",
"Clean glass doors & windows",
"Spray insect repellent & air freshener",
"Set playlist & adjust outlet music volume (10:50)",
"Assign station & double-check everything (10:50)",
"Ready to rock! (10:55)"
];

const checklistDiv = document.getElementById("checklist");
const progressBar = document.getElementById("progressBar");

function loadChecklist() {
    checklistDiv.innerHTML = "";
    tasks.forEach((task, index) => {
        const checked = localStorage.getItem("task_" + index) === "true";
        checklistDiv.innerHTML += `
            <div class="checklist-item">
                <input type="checkbox" 
                ${checked ? "checked" : ""} 
                onchange="saveTask(${index}, this.checked)">
                ${task}
            </div>
        `;
    });
    updateProgress();
}

function saveTask(index, value) {
    localStorage.setItem("task_" + index, value);
    updateProgress();
}

function updateProgress() {
    let completed = 0;
    tasks.forEach((_, index) => {
        if (localStorage.getItem("task_" + index) === "true") {
            completed++;
        }
    });
    const percent = Math.round((completed / tasks.length) * 100);
    progressBar.style.width = percent + "%";
    progressBar.textContent = percent + "%";
}

function resetChecklist() {
    tasks.forEach((_, index) => {
        localStorage.removeItem("task_" + index);
    });
    localStorage.removeItem("waiterName");
    localStorage.removeItem("supervisorName");
    document.getElementById("waiterName").value = "";
    document.getElementById("supervisorName").value = "";
    loadChecklist();
}

document.getElementById("waiterName").addEventListener("input", function() {
    localStorage.setItem("waiterName", this.value);
});

document.getElementById("supervisorName").addEventListener("input", function() {
    localStorage.setItem("supervisorName", this.value);
});

document.getElementById("waiterName").value = localStorage.getItem("waiterName") || "";
document.getElementById("supervisorName").value = localStorage.getItem("supervisorName") || "";

document.getElementById("currentDate").textContent = 
new Date().toLocaleDateString();

loadChecklist();

</script>

</body>
</html>
